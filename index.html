<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Website của Khuê</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    font-family:Arial;
    color:white;
}

.box{
    text-align:center;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1{
    color:#60a5fa;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 0 20px #60a5fa;
}
</style>
</head>

<body>

<div class="box">
    <h1>✨ Website đầu tiên ✨</h1>
    <p>Hello mọi người :3</p>

    <button onclick="alert('Xin chào :D')">
        Bấm vào đây
    </button>
</div>

</body>
</html>
